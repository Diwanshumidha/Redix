name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - 'CHANGELOG.md'
      - 'package.json'
  pull_request:
    branches: [master]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check (main)
        run: pnpm exec tsc --noEmit -p tsconfig.node.json

      - name: Type-check (renderer)
        run: pnpm exec tsc --noEmit -p tsconfig.web.json

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: typecheck

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (Vite only, no packaging)
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: out-${{ matrix.os }}
          path: out/
          retention-days: 7
