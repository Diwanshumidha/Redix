name: Package

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    strategy:
      fail-fast: false

      matrix:
        include:
          - os: ubuntu-latest
            args: --linux
            artifacts: "dist/*.AppImage dist/*.deb"

          - os: windows-latest
            args: --win
            artifacts: "dist/*.exe"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg rpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm build

      - name: Package app
        run: pnpm exec electron-builder ${{ matrix.args }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Debug dist
        run: |
          echo "=== DIST ==="
          find dist || dir dist

      - name: Upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.workflow_run.run_number }}
          files: ${{ matrix.artifacts }}